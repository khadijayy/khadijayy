<svg width="100%" height="60" viewBox="0 0 800 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#89ddff" stop-opacity="0"/>
      <stop offset="70%" stop-color="#89ddff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- twinkling background stars -->
  <circle cx="60" cy="15" r="1.2" fill="#ffffff" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="40" r="1" fill="#ffffff" opacity="0.5">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="10" r="1.3" fill="#ffffff" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="35" r="1" fill="#ffffff" opacity="0.5">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="18" r="1.2" fill="#ffffff" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- shooting star group: trail + head, animated along a diagonal path -->
  <g>
    <line x1="-60" y1="0" x2="0" y2="0" stroke="url(#trail)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff"/>
    <animateMotion path="M -60,50 L 860,-10" dur="3.5s" repeatCount="indefinite" begin="0s"/>
  </g>
</svg>
